name: Paper Analysis (Issue Trigger)

on:
  issues:
    types: [opened]

  workflow_dispatch:
    inputs:
      arxiv_url:
        description: 'Arxiv URL or paper ID'
        required: true
        type: string

permissions:
  contents: read
  issues: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # 只处理标题包含 [精读] 的 Issue
    if: contains(github.event.issue.title, '[精读]') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract arxiv URL from issue
        id: paper
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=${{ github.event.inputs.arxiv_url }}" >> $GITHUB_OUTPUT
          else
            # 从 Issue body 中提取 arxiv URL
            BODY="${{ github.event.issue.body }}"
            URL=$(echo "$BODY" | grep -oP 'https://arxiv\.org/abs/\S+' | head -1)
            if [ -z "$URL" ]; then
              URL=$(echo "$BODY" | grep -oP 'arxiv\.org/abs/\S+' | head -1)
              if [ -n "$URL" ]; then
                URL="https://$URL"
              fi
            fi
            if [ -z "$URL" ]; then
              echo "No arxiv URL found in issue body"
              exit 1
            fi
            echo "url=$URL" >> $GITHUB_OUTPUT
            echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Run paper-reading
        id: reading
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_RECEIVE_ID: ${{ secrets.FEISHU_RECEIVE_ID }}
          FEISHU_RECEIVE_ID_TYPE: ${{ secrets.FEISHU_RECEIVE_ID_TYPE }}
          OCR_API_TOKEN: ${{ secrets.OCR_API_TOKEN }}
        run: |
          python scripts/reading.py --url "${{ steps.paper.outputs.url }}" --use-ocr --push-to-feishu 2>&1 | tee reading_output.txt

      - name: Extract analysis JSON
        id: extract
        run: |
          if [ -f output/analysis.json ]; then
            cp output/analysis.json analysis.json
            python -c "import json; d=json.load(open('analysis.json')); print(f'Verdict: {d.get(\"verdict\",\"?\")}'); print(f'Priority: {d.get(\"reading_priority\",\"?\")}')"
          else
            echo "No analysis JSON found"
            exit 1
          fi

      - name: Post comment on issue
        if: steps.paper.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRIORITY=$(python -c "import json; d=json.load(open('analysis.json')); print(d.get('reading_priority','可暂缓'))")
          SUMMARY=$(python -c "import json; d=json.load(open('analysis.json')); print(d.get('quick_take','未知')[:300])")
          QUESTION=$(python -c "import json; d=json.load(open('analysis.json')); print(d.get('research_question','未知')[:200])")
          REASON=$(python -c "import json; d=json.load(open('analysis.json')); print(d.get('priority_reason','未知')[:200])")

          COMMENT=$(cat <<EOF
          ## 📖 精读分析完成

          **30 秒理解**: ${SUMMARY}

          **研究问题**: ${QUESTION}

          **推荐理由**: ${REASON}

          **阅读优先级**: ${PRIORITY}

          ---
          完整结果已通过飞书应用私聊推送。
          EOF
          )

          gh issue comment ${{ steps.paper.outputs.issue_number }} --body "$COMMENT"

      - name: Close issue
        if: steps.paper.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ steps.paper.outputs.issue_number }} --reason "completed"

      - name: Run deep-note (if worth it)
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          PRIORITY=$(python -c "import json; d=json.load(open('analysis.json')); print(d.get('reading_priority','可暂缓'))")
          if [ "$PRIORITY" = "值得精读" ]; then
            echo "📝 Generating deep note..."
            python scripts/deep_note.py --from-reading analysis.json
          else
            echo "Skipping deep note (priority: $PRIORITY)"
          fi

      - name: Upload reading evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-reading-evidence
          path: |
            analysis.json
            output/analysis.json
            output/ocr/**/*.md
            output/*_deepnote.md
          if-no-files-found: ignore
          retention-days: 14

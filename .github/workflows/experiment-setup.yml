name: Experiment Setup Extraction (Issue Trigger)

on:
  issues:
    types: [opened]

  workflow_dispatch:
    inputs:
      arxiv_url:
        description: 'Arxiv URL or paper ID'
        required: true
        type: string

permissions:
  contents: read
  issues: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # 只处理标题包含 [实验配置] 的 Issue
    if: contains(github.event.issue.title, '[实验配置]') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract arxiv URL from issue
        id: paper
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=${{ github.event.inputs.arxiv_url }}" >> $GITHUB_OUTPUT
          else
            BODY="${{ github.event.issue.body }}"
            URL=$(echo "$BODY" | grep -oP 'https://arxiv\.org/abs/\S+' | head -1)
            if [ -z "$URL" ]; then
              URL=$(echo "$BODY" | grep -oP 'arxiv\.org/abs/\S+' | head -1)
              if [ -n "$URL" ]; then
                URL="https://$URL"
              fi
            fi
            if [ -z "$URL" ]; then
              echo "No arxiv URL found in issue body"
              exit 1
            fi
            echo "url=$URL" >> $GITHUB_OUTPUT
            echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Run experiment-setup extraction
        id: setup
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_RECEIVE_ID: ${{ secrets.FEISHU_RECEIVE_ID }}
          FEISHU_RECEIVE_ID_TYPE: ${{ secrets.FEISHU_RECEIVE_ID_TYPE }}
          MINERU_TOKEN: ${{ secrets.MINERU_TOKEN }}
        run: |
          python scripts/extract_setup.py --url "${{ steps.paper.outputs.url }}" --push-to-feishu 2>&1 | tee setup_output.txt

      - name: Post comment on issue
        if: steps.paper.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COVERAGE=$(python -c "import json; d=json.load(open('output/setup.json')); print(d.get('input_coverage','未知'))")
          MODEL=$(python -c "import json; d=json.load(open('output/setup.json')); m=d.get('model',{}); print(m.get('name','未知'))")
          CODE=$(python -c "import json; d=json.load(open('output/setup.json')); print(d.get('reproducibility',{}).get('code_url','未知'))")

          COMMENT=$(cat <<EOF
          ## 🔬 实验配置抽取完成

          **分析输入**: ${COVERAGE}

          **模型**: ${MODEL}

          **代码**: ${CODE}

          ---
          完整实验配置已通过飞书应用私聊推送。
          EOF
          )

          gh issue comment ${{ steps.paper.outputs.issue_number }} --body "$COMMENT"

      - name: Close issue
        if: steps.paper.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ steps.paper.outputs.issue_number }} --reason "completed"

      - name: Upload setup evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-setup-evidence
          path: |
            output/setup.json
            output/ocr/**/*.md
          if-no-files-found: ignore
          retention-days: 14
